<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой список фильмов</title>
    <link rel="shortcut icon" href="images/favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
       <h1>Мой список</h1>    
    </header>
    <main>
        <div class="main__statictics">
            <span>Всего:</span><span class="main__statistic__count" id="statistic__total">0</span>
            <span>Просмотрено:</span><span class="main__statistic__count" id="statistic__watched">0</span>
            <span>Не просмотрено:</span><span class="main__statistic__count" id="statistic__not__watched">0</span>
        </div>
        <form class="add__form" id="add_form">
            <div class="info">
                <label for="film__name">Название фильма:</label>
                <input type="text" name="film__name" id="film__name" placeholder="Введите название">
            </div>
            <div class="info">
                <label for="film__year">Год выхода:</label>
                <input type="text" name="film__year" id="film__year" placeholder="Введите год">
            </div>
            <div class="action">
                <button>Добавить фильм</button>
            </div>
        </form>
    </main>
</body>
</html>
