<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой список фильмов</title>
    <link rel="shortcut icon" href="images/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <script src="scrips.js"></script>
</head>
<body>
    <header>
       <h1>Мой список фильмов</h1>    
    </header>
    <main>
        <div class="main__statictics">
            <span>Всего:</span><span class="main__statistic__count" id="statistic_total">0</span>
            <span>Просмотрено:</span><span class="main__statistic__count" id="statistic_watched">0</span>
            <span>Не просмотрено:</span><span class="main__statistic__count" id="statistic_not_watched">0</span>
        </div>
        <form class="add__form" id="add_form">
            <div class="info">
                <label for="film__name">Название фильма:</label>
                <input type="text" name="film__name" id="film_name" placeholder="Введите название">
            </div>
            <div class="info">
                <label for="film__year">Год выхода:</label>
                <input type="text" name="film__year" id="film_year" placeholder="Введите год">
            </div>
            <div class="action">
                <button>Добавить фильм</button>
            </div>
        </form>
        <div class="error" id="error_message"></div>
        <div class="filter" id="filter">
            <div class="filter__group">
                <button class="filter__group__btn active_btn" id="btn_total" data-filter="all">Все</button>
                <button class="filter__group__btn" id="btn_watched" data-filter="watched">Просмотренные</button>
                <button class="filter__group__btn" id="btn_not_watched" data-filter="not_watched">Не просмотренные</button>
            </div>
        </div>
        <div class="list__movie" id="list_movie"></div>
    </main>
</body>
</html>
